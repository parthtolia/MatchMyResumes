app = "matchmyresumes-backend"
primary_region = "sin"   # Singapore — change to: iad (US East), lhr (London), bom (Mumbai)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false   # always-on, no cold starts
  auto_start_machines = true
  min_machines_running = 1

[env]
  APP_ENV = "production"
  PORT = "8000"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
